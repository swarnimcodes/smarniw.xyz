content = """

This was my first foray into the world of professional software engineering!
I was lucky enough to work with a brilliant manager who guided and taught me a lot about the
proper mindset to have while buidling large-scale products.

The flagship product I built here was called Panopticon. I am grateful to have been given the
opportunity to build the entire core functionality and scalability aspects while also have the
privilege to name it.
As some of you might guess, Panopticon was an employee performance measurement product.
This product helped the organization to hire remote talent with utmost confidence since our metrics
were super accurate and insightful.
It was an intrusive product for the user but it was eye-opening that I could build it.
Made me question that if I could build such a sophisticated product, what can the armies
of countries such as the USA build. Not to make it political but building this product
made me realise that the next war is indeed going to be an information war first.

