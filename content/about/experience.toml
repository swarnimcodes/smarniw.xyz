date = "Aug 2024 -- Feb 2026"
content = """
Worked as a full-stack engineer on projects, collaborating with prestigious institutes
such as the Indian Navy, Indian Oil Corp, BlueGulf Ship Builders Abu Dhabi.

My flagship project here was designing and building the entire database structure,
backend structure as well as professional frontend for **Project ISACA**.
Project ISACA is an autonomous high-speed water bound vessel that is capable
of operations ranging from rescuing, surveying as well as attacking; all done
autonomously! It was a huge responsibilty, considering I was working on building an
innovative product for our country's defence. And as you can imagine, this
project is bound to play a huge impact in our country's safety in the upcoming years.

As you can guess, my work heavily relied upon building reliable databases and backends primarily.

